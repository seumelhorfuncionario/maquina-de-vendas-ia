<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px;
    position: relative; overflow: hidden;
  }
  .bg {
    width: 100%; height: 100%; object-fit: cover;
    position: absolute; top: 0; left: 0; z-index: 0;
  }
  .overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.78); z-index: 1;
  }
  .content {
    position: relative; z-index: 2;
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 100px;
  }
  .quote-mark {
    font-family: Georgia, serif; font-size: 160px;
    color: #A855F7; opacity: 0.3;
    line-height: 0.8; margin-bottom: 16px;
  }
  .quote-text {
    font-family: 'Raleway', sans-serif;
    font-weight: 400; font-style: italic; font-size: 42px;
    color: rgba(255,255,255,0.95);
    text-align: center; line-height: 1.5; max-width: 800px;
    margin-bottom: 44px;
  }
  .quote-line { width: 60px; height: 2px; background: #A855F7; opacity: 0.5; margin-bottom: 24px; }
  .quote-author {
    font-family: 'Raleway', sans-serif;
    font-weight: 700; font-size: 22px;
    color: rgba(255,255,255,0.60);
    text-transform: uppercase; letter-spacing: 2px;
  }
  .branding {
    position: absolute; bottom: 30px; left: 0; right: 0;
    text-align: center; z-index: 2;
    color: rgba(255,255,255,0.35);
    font-family: 'JetBrains Mono', monospace; font-size: 14px;
  }
</style>
</head>
<body>
  <img class="bg" src="../backgrounds/bg_antes_depois.png" />
  <div class="overlay"></div>
  <div class="content">
    <div class="quote-mark">&ldquo;</div>
    <div class="quote-text">Um quadro n&#227;o decora uma parede.<br>Ele conta quem voc&#234; &#233;.</div>
    <div class="quote-line"></div>
    <div class="quote-author">&#8212; Arte Nossa</div>
  </div>
  <div class="branding">@artenossa.cv</div>
</body>
</html>
